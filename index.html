<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plant of the Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="banner">
      <h1 id="page-title">The Daily Pin</h1>
    </div>
    <nav class="site-nav" role="tablist">
      <button class="nav-tab nav-tab--daily is-active" data-view="daily" role="tab" aria-selected="true">The Daily Pin</button>
      <button class="nav-tab nav-tab--tree" data-view="tree" role="tab" aria-selected="false">The Family Tree</button>
    </nav>
  </header>

  <main>
    <div class="notebook-pages">
      <section id="view-daily" class="view is-active">
        <p id="streak" class="streak"></p>
        <button id="flip-all" class="flip-all-btn" type="button">Flip All ↺</button>
        <div id="board" class="board"></div>
      </section>
      <section id="view-tree" class="view">
        <div id="tree-wrap" class="tree-wrap"></div>
      </section>
    </div>
  </main>

  <script src="js/plants.js"></script>
  <script src="js/app.js"></script>
  <script src="js/tree.js"></script>
  <script src="js/router.js"></script>
</body>
</html>
